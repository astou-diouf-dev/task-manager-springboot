<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Gestion des tâches</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4 fw-bold text-primary">
        Gestion des Tâches
    </h2>

    <!-- FORMULAIRE -->

    <div class="card shadow-lg p-4 mb-4 border-0">

        <h5 class="text-primary mb-3">Ajouter une tâche</h5>

        <form th:action="@{/tasks/save}" th:object="${task}" method="post">

            <input type="hidden" th:field="*{id}"/>

            <div class="mb-3">
                <label class="form-label">Titre</label>
                <input type="text" th:field="*{title}" class="form-control" placeholder="Entrer le titre" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea th:field="*{description}" class="form-control" placeholder="Entrer la description"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Statut</label>
                <select th:field="*{status}" class="form-select">

                    <option value="EN_COURS">En cours</option>
                    <option value="TERMINE">Terminé</option>

                </select>
            </div>

            <button type="submit" class="btn btn-primary">
                Ajouter
            </button>

        </form>

    </div>

    <!-- LISTE DES TACHES -->

    <div class="card shadow-lg p-4 border-0">

        <h5 class="mb-3 text-dark">Liste des tâches</h5>

        <table class="table table-hover align-middle">

            <thead class="table-dark">

            <tr>
                <th>ID</th>
                <th>Titre</th>
                <th>Description</th>
                <th>Statut</th>
                <th>Actions</th>
            </tr>

            </thead>

            <tbody>

            <tr th:each="task : ${tasks}">

                <td th:text="${task.id}"></td>

                <td th:text="${task.title}"></td>

                <td th:text="${task.description}"></td>

                <td>

<span th:if="${task.status.name() == 'EN_COURS'}"
      class="badge bg-warning text-dark">
En cours
</span>

                    <span th:if="${task.status.name() == 'TERMINE'}"
                          class="badge bg-success">
Terminé
</span>

                </td>

                <td>

                    <a th:href="@{/tasks/edit/{id}(id=${task.id})}"
                       class="btn btn-warning btn-sm">
                        Modifier
                    </a>

                    <a th:href="@{/tasks/delete/{id}(id=${task.id})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Supprimer cette tâche ?')">
                        Supprimer
                    </a>

                    <a th:if="${task.status.name() == 'EN_COURS'}"
                       th:href="@{/tasks/complete/{id}(id=${task.id})}"
                       class="btn btn-success btn-sm">
                        Terminer
                    </a>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>

</html>
