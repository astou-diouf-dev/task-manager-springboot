<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Task Manager</title>

    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
        background:#f4f6f9;
        }

        .card{
        border-radius:10px;
        }

        .table{
        border-radius:10px;
        overflow:hidden;
        }

    </style>

</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4 fw-bold">
        Gestion des Tâches
    </h2>

    <!-- FORMULAIRE -->

    <div class="card shadow mb-4">

        <div class="card-header bg-primary text-white fw-bold">

            Ajouter / Modifier une tâche

        </div>

        <div class="card-body">

            <form th:action="@{/tasks/save}" th:object="${task}" method="post">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Titre</label>

                        <input type="text"
                               th:field="*{title}"
                               class="form-control"
                               placeholder="Titre de la tâche"
                               required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Date</label>

                        <input type="date"
                               th:field="*{date}"
                               class="form-control">

                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label">Description</label>

                    <input type="text"
                           th:field="*{description}"
                           class="form-control"
                           placeholder="Description">

                </div>

                <div class="mb-3">

                    <label class="form-label">Statut</label>

                    <select th:field="*{status}" class="form-select">

                        <option value="EN_COURS">En cours</option>
                        <option value="TERMINE">Terminé</option>

                    </select>

                </div>

                <button type="submit" class="btn btn-primary">

                    Ajouter / Enregistrer

                </button>

            </form>

        </div>

    </div>

    <!-- LISTE DES TÂCHES -->

    <div class="card shadow">

        <div class="card-header bg-dark text-white fw-bold">

            Liste des tâches

        </div>

        <div class="card-body">

            <table class="table table-hover text-center">

                <thead class="table-light">

                <tr>

                    <th>ID</th>
                    <th>Titre</th>
                    <th>Description</th>
                    <th>Date</th>
                    <th>Statut</th>
                    <th>Actions</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="task : ${tasks}">

                    <td th:text="${task.id}"></td>

                    <td th:text="${task.title}"></td>

                    <td th:text="${task.description}"></td>

                    <td th:text="${task.date}"></td>

                    <td>

<span class="badge bg-warning"
      th:if="${task.status.name() == 'EN_COURS'}">
En cours
</span>

                        <span class="badge bg-success"
                              th:if="${task.status.name() == 'TERMINE'}">
Terminé
</span>

                    </td>

                    <td>

                        <a th:href="@{/tasks/edit/{id}(id=${task.id})}"
                           class="btn btn-warning btn-sm">
                            Modifier
                        </a>

                        <a th:href="@{/tasks/complete/{id}(id=${task.id})}"
                           class="btn btn-success btn-sm">
                            Terminer
                        </a>

                        <a th:href="@{/tasks/delete/{id}(id=${task.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Supprimer cette tâche ?')">
                            Supprimer
                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
